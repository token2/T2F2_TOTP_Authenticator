<svg viewBox="0 0 420 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Inter, Arial, sans-serif">
  <rect width="420" height="380" fill="#1B2A4A" opacity="0.12"/>
  <rect x="32" y="20" width="356" height="340" rx="12" fill="#000000" opacity="0.10"/>
  <rect x="30" y="16" width="356" height="340" rx="12" fill="#FFFFFF" stroke="#E2E5EC"/>

  <text x="48" y="42" font-size="15" font-weight="700" fill="#1B2A4A">Settings</text>
  <rect x="346" y="26" width="28" height="26" rx="7" fill="#FFFFFF" stroke="#E2E5EC"/>
  <text x="360" y="44" font-size="15" fill="#1B2A4A" text-anchor="middle">×</text>
  <line x1="30" y1="58" x2="386" y2="58" stroke="#EEF0F4"/>

  <text x="48" y="80" font-size="13.5" font-weight="700" fill="#1B2A4A">Global Auto-OTP hotkey</text>
  <text x="48" y="96" font-size="11" fill="#8A93A6">Types the [A] profile's code into the focused window.</text>

  <text x="48" y="120" font-size="11" fill="#8A93A6">Shortcut</text>
  <text x="48" y="142" font-size="12.5" font-family="monospace" font-weight="700" fill="#1B2A4A">Ctrl + Alt +</text>
  <rect x="150" y="128" width="64" height="22" rx="6" fill="#FCFCFD" stroke="#E2E5EC"/>
  <text x="162" y="143" font-size="12.5" fill="#1B2A4A">A</text>
  <text x="202" y="143" font-size="10" fill="#8A93A6">▾</text>
  <text x="48" y="164" font-size="10.5" fill="#8A93A6">The combo is fixed to Ctrl + Alt plus one of the supported letters.</text>

  <rect x="48" y="178" width="15" height="15" rx="3" fill="#F20043"/><text x="51.5" y="190" fill="#FFFFFF" font-size="11">✔</text>
  <text x="68" y="190" font-size="12" fill="#1B2A4A">Press Enter after typing the code</text>

  <text x="48" y="220" font-size="12.5" font-family="monospace" fill="#1B2A4A">Combo:  Ctrl + Alt + A</text>
  <rect x="270" y="208" width="98" height="26" rx="7" fill="#F20043"/>
  <text x="319" y="225" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Apply &amp; enable</text>

  <text x="48" y="252" font-size="10.5" fill="#8A93A6">Letters: A · B · C · F · N · Q · S · V · X · Z</text>

  <line x1="30" y1="272" x2="386" y2="272" stroke="#EEF0F4"/>
  <text x="48" y="296" font-size="13.5" font-weight="700" fill="#C10038">Danger zone</text>
  <text x="48" y="312" font-size="11" fill="#8A93A6">Erase every TOTP profile stored on the key.</text>
  <rect x="48" y="322" width="150" height="28" rx="7" fill="#FBE9EE" stroke="#C10038"/>
  <text x="123" y="340" font-size="12" font-weight="600" fill="#C10038" text-anchor="middle">Erase all profiles…</text>
  <rect x="328" y="322" width="58" height="28" rx="7" fill="#FFFFFF" stroke="#E2E5EC"/>
  <text x="357" y="340" font-size="12.5" fill="#1B2A4A" text-anchor="middle">Close</text>
</svg>
